# Dependency vulnerability audit for OpenMassSpec.
#
# Runs cargo-audit against the RustSec Advisory DB on every push/PR that
# touches the lockfile or manifests, plus a weekly schedule so advisories
# published after the last dependency change are still caught.

name: Audit

on:
  push:
    branches: ["main"]
    paths:
      - "**/Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/audit.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "**/Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/audit.yml"
  schedule:
    - cron: "0 6 * * 1"

jobs:
  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: taiki-e/install-action@cargo-audit
      # quick-xml (RUSTSEC-2026-0194/0195) was a transitive dep via mzdata,
      # pinned to quick-xml "^0.30". mobiusklein/mzdata#53 bumped it to
      # 0.41 on mzdata's main branch (merged 2026-07-14) and shipped in
      # mzdata 0.65.4 (published 2026-07-14). Cleared by bumping mzdata to
      # 0.65.4 here; see Sigilweaver/OpenMassSpec#4.
      - run: cargo audit
