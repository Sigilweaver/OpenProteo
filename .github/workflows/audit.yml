# Dependency vulnerability audit for OpenMassSpec.
#
# Runs cargo-audit against the RustSec Advisory DB on every push/PR that
# touches the lockfile or manifests, plus a weekly schedule so advisories
# published after the last dependency change are still caught.

name: Audit

on:
  push:
    branches: ["main"]
    paths:
      - "**/Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/audit.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "**/Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/audit.yml"
  schedule:
    - cron: "0 6 * * 1"

jobs:
  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/install-action@cargo-audit
      # quick-xml (RUSTSEC-2026-0194/0195) is a transitive dep via mzdata.
      # mobiusklein/mzdata#53 bumped it to 0.41 on mzdata's main branch
      # (merged 2026-07-14) but mzdata hasn't cut a release since - still
      # nothing to bump here until it does. Tracked in
      # Sigilweaver/OpenMassSpec#4.
      - run: >
          cargo audit
          --ignore RUSTSEC-2026-0194
          --ignore RUSTSEC-2026-0195
