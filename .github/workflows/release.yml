# Release binaries for vendor2mzml.
#
# Triggered by pushing a tag matching v*. Builds vendor2mzml for the five
# supported targets, packages archives, and attaches them to the GitHub
# release. Vendor-crate deps are pulled from crates.io; no multi-repo
# checkout is required.

name: Release (binaries)

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - label: linux-aarch64
            os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            archive: tar.gz
            cross: true
          - label: macos-x86_64
            os: macos-latest
            target: x86_64-apple-darwin
            archive: tar.gz
          - label: macos-aarch64
            os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz
          - label: windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compile gcc (linux-aarch64)
        if: matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo 'CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc' >> "$GITHUB_ENV"

      - name: Build vendor2mzml
        run: cargo build --release -p openmassspec-io-cli --target ${{ matrix.target }}

      - name: Package archive (unix)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          NAME=vendor2mzml-${{ github.ref_name }}-${{ matrix.label }}
          mkdir -p dist/$NAME
          cp target/${{ matrix.target }}/release/vendor2mzml dist/$NAME/
          cp README.md LICENSE CHANGELOG.md dist/$NAME/ 2>/dev/null || true
          tar -C dist -czf dist/$NAME.tar.gz $NAME
          shasum -a 256 dist/$NAME.tar.gz > dist/$NAME.tar.gz.sha256

      - name: Package archive (windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $name = "vendor2mzml-${{ github.ref_name }}-${{ matrix.label }}"
          New-Item -ItemType Directory -Force -Path "dist/$name" | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/vendor2mzml.exe" "dist/$name/"
          foreach ($f in @("README.md","LICENSE","CHANGELOG.md")) {
            if (Test-Path $f) { Copy-Item $f "dist/$name/" }
          }
          Compress-Archive -Path "dist/$name/*" -DestinationPath "dist/$name.zip"
          (Get-FileHash "dist/$name.zip" -Algorithm SHA256).Hash | Out-File "dist/$name.zip.sha256" -Encoding ascii

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: vendor2mzml-${{ matrix.label }}
          path: dist/vendor2mzml-*

  release:
    name: Attach to GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true
      - name: List artifacts
        run: ls -la dist
      - name: Create / update GitHub release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/vendor2mzml-*.tar.gz
            dist/vendor2mzml-*.tar.gz.sha256
            dist/vendor2mzml-*.zip
            dist/vendor2mzml-*.zip.sha256
          generate_release_notes: true
