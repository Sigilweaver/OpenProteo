# Publish the OpenMassSpec stack to crates.io and PyPI on tag push.
#
# - `openmassspec-io` (Rust library) -> crates.io
# - `openmassspec-io` (Python wheel via maturin matrix) -> PyPI
# - `openmassspec` (pure-Python metapackage) -> PyPI
#
# Wheel and sdist uploads use PyPI trusted publishing (OIDC); no PyPI
# tokens live in this repo. The `openmassspec` and `openmassspec-io`
# trusted publishers must be configured on PyPI to allow uploads from
# this workflow (Sigilweaver/OpenMassSpec, workflow `publish.yml`).
#
# The CLI (`openmassspec-io-cli` / `vendor2mzml`) ships only as binary
# release artifacts and is intentionally not on crates.io or PyPI.
#
# Requires repository secret CARGO_REGISTRY_TOKEN with publish access
# to the `openmassspec-io` crate.

name: Publish

on:
  push:
    tags: ["v*"]

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  cargo-publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo publish -p openmassspec-io
        continue-on-error: true
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  build-wheels:
    name: Build wheels (${{ matrix.os }} / ${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64
          - os: ubuntu-latest
            target: aarch64
          - os: macos-latest
            target: x86_64
          - os: macos-latest
            target: aarch64
          - os: windows-latest
            target: x86_64
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --find-interpreter --manifest-path crates/openmassspec-io-py/Cargo.toml
          sccache: "true"
          manylinux: auto
      - uses: actions/upload-artifact@v7
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.target }}
          path: dist

  build-sdist:
    name: Build openmassspec-io sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist --manifest-path crates/openmassspec-io-py/Cargo.toml
      - uses: actions/upload-artifact@v7
        with:
          name: sdist-openmassspec-io
          path: dist

  build-metapackage:
    name: Build openmassspec metapackage (sdist + wheel)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip build
      - run: python -m build --sdist --wheel --outdir dist python/
      - uses: actions/upload-artifact@v7
        with:
          name: dist-openmassspec
          path: dist

  publish-openmassspec-io:
    name: Publish openmassspec-io to PyPI
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/openmassspec-io
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true
      - uses: actions/download-artifact@v8
        with:
          name: sdist-openmassspec-io
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          skip-existing: true

  publish-openmassspec:
    name: Publish openmassspec metapackage to PyPI
    needs: [build-metapackage]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/openmassspec
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist-openmassspec
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          skip-existing: true
