# CI for OpenProteo (umbrella).
#
# The workspace pulls openproteo-core, opentfraw, opentimstdf, openwraw via
# path = "../<repo>" dependencies, so CI must check out all five repos as
# siblings. The matrix runs fmt + clippy + test on Ubuntu and macOS.

name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  rust:
    name: Rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    steps:
      - name: Checkout OpenProteo
        uses: actions/checkout@v4
        with:
          path: OpenProteo

      - name: Checkout OpenProteoCore
        uses: actions/checkout@v4
        with:
          repository: Sigilweaver/OpenProteoCore
          path: OpenProteoCore

      - name: Checkout OpenTFRaw
        uses: actions/checkout@v4
        with:
          repository: Sigilweaver/OpenTFRaw
          path: OpenTFRaw

      - name: Checkout OpenTDF
        uses: actions/checkout@v4
        with:
          repository: Sigilweaver/OpenTimsTDF
          path: OpenTDF

      - name: Checkout OpenWRaw
        uses: actions/checkout@v4
        with:
          repository: Sigilweaver/OpenWRaw
          path: OpenWRaw

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: OpenProteo

      - name: cargo fmt
        working-directory: OpenProteo
        run: cargo fmt --all -- --check

      - name: cargo clippy
        working-directory: OpenProteo
        run: cargo clippy --workspace --all-features --all-targets -- -D warnings

      - name: cargo test
        working-directory: OpenProteo
        run: cargo test --workspace --all-features

  msrv:
    name: MSRV check (1.75)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: OpenProteo
      - uses: actions/checkout@v4
        with:
          repository: Sigilweaver/OpenProteoCore
          path: OpenProteoCore
      - uses: actions/checkout@v4
        with:
          repository: Sigilweaver/OpenTFRaw
          path: OpenTFRaw
      - uses: actions/checkout@v4
        with:
          repository: Sigilweaver/OpenTimsTDF
          path: OpenTDF
      - uses: actions/checkout@v4
        with:
          repository: Sigilweaver/OpenWRaw
          path: OpenWRaw
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.75
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: OpenProteo
      - name: cargo check (MSRV)
        working-directory: OpenProteo
        run: cargo check --workspace --all-features

  python:
    name: Python smoke (${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.9", "3.12"]
    steps:
      - uses: actions/checkout@v4
        with:
          path: OpenProteo
      - uses: actions/checkout@v4
        with:
          repository: Sigilweaver/OpenProteoCore
          path: OpenProteoCore
      - uses: actions/checkout@v4
        with:
          repository: Sigilweaver/OpenTFRaw
          path: OpenTFRaw
      - uses: actions/checkout@v4
        with:
          repository: Sigilweaver/OpenTimsTDF
          path: OpenTDF
      - uses: actions/checkout@v4
        with:
          repository: Sigilweaver/OpenWRaw
          path: OpenWRaw
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: OpenProteo
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install maturin + pytest
        run: pip install 'maturin>=1.5,<2' pytest pyarrow numpy
      - name: Build and install openproteo-io
        working-directory: OpenProteo/crates/openproteo-io-py
        run: maturin develop --release --features pyo3/extension-module
      - name: Import smoke test
        run: python -c "import openproteo_io; print(openproteo_io.__version__ if hasattr(openproteo_io, '__version__') else 'ok')"
