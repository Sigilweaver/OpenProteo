# CI for OpenMassSpec (umbrella).
#
# The workspace pulls openmassspec-core, opentfraw, opentimstdf, openwraw,
# openaraw, and opensxraw from crates.io (registry versions pinned in
# Cargo.toml), so only this repo needs to be checked out. The rust and
# python matrices mirror release.yml/publish.yml's wheel-build matrix
# (Ubuntu, macOS, Windows) per CI_STANDARDS.md - every OS a wheel/binary
# ships for gets exercised here. fmt/clippy are OS-independent and only
# run once, on Ubuntu.

name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  rust:
    name: Rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    defaults:
      run:
        # windows-latest defaults to pwsh; the steps below (and Swatinem/
        # rust-cache internals) assume POSIX shell syntax. Git-for-Windows
        # ships a real bash, so this works uniformly across all three OSes.
        shell: bash
    steps:
      - name: Checkout OpenMassSpec
        uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      # fmt/clippy results are OS-independent; only run them once to avoid
      # tripling redundant CI time (org standard, see CI_STANDARDS.md).
      - name: cargo fmt
        if: matrix.os == 'ubuntu-latest'
        run: cargo fmt --all -- --check

      - name: cargo clippy
        if: matrix.os == 'ubuntu-latest'
        run: cargo clippy --workspace --all-features --all-targets -- -D warnings

      - name: cargo test
        run: cargo test --workspace --all-features

      - name: vendor2mzml validate against shared corpus (best-effort)
        if: matrix.os == 'ubuntu-latest'
        env:
          OPENMASSSPEC_THERMO_RAW: ${{ secrets.OPENMASSSPEC_THERMO_RAW }}
          OPENMASSSPEC_BRUKER_D: ${{ secrets.OPENMASSSPEC_BRUKER_D }}
          OPENMASSSPEC_WATERS_RAW: ${{ secrets.OPENMASSSPEC_WATERS_RAW }}
        run: |
          set -e
          for VAR in OPENMASSSPEC_THERMO_RAW OPENMASSSPEC_BRUKER_D OPENMASSSPEC_WATERS_RAW; do
            VAL="${!VAR}"
            if [ -z "$VAL" ]; then
              echo "skip $VAR (unset)"
              continue
            fi
            if [ ! -e "$VAL" ]; then
              echo "skip $VAR=$VAL (not present in runner)"
              continue
            fi
            echo "validate $VAR -> $VAL"
            cargo run -p openmassspec-io-cli --release --quiet -- validate --json "$VAL"
          done

  msrv:
    name: MSRV check (1.88)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.88"
      - uses: Swatinem/rust-cache@v2
      - name: cargo check (MSRV)
        run: cargo check --workspace --all-features

  python:
    name: Python smoke (${{ matrix.os }} / ${{ matrix.python }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        python: ["3.9", "3.12"]
    defaults:
      run:
        # windows-latest defaults to pwsh; the steps below rely on POSIX
        # shell syntax. Git-for-Windows ships a real bash, so this works
        # uniformly across all three OSes.
        shell: bash
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Create venv
        run: |
          python -m venv .venv
          if [ -f .venv/bin/activate ]; then
            echo "$PWD/.venv/bin" >> "$GITHUB_PATH"
          else
            # Windows venvs put scripts (incl. python.exe) in Scripts/, not bin/.
            echo "$PWD/.venv/Scripts" >> "$GITHUB_PATH"
          fi
          echo "VIRTUAL_ENV=$PWD/.venv" >> "$GITHUB_ENV"
      - name: Install maturin + pytest
        run: pip install 'maturin>=1.5,<2' pytest pyarrow numpy
      - name: Build and install openmassspec-io
        working-directory: crates/openmassspec-io-py
        # maturin supplies the pyo3 extension-module linker flags for us
        # (incl. the macOS -undefined dynamic_lookup / Windows import-lib
        # handling); no bare `cargo build`/`cargo test` runs in this job.
        run: maturin develop --release --features pyo3/extension-module
      - name: Install openmassspec metapackage
        run: pip install ./python
      - name: Import smoke test
        run: python -c "import openmassspec_io; print(openmassspec_io.__version__ if hasattr(openmassspec_io, '__version__') else 'ok')"
      - name: Metapackage import smoke
        run: python -c "import openmassspec; print(openmassspec.__version__); assert callable(openmassspec.to_mzml)"
      - name: Metapackage tests
        run: pytest python/tests -v

  docs:
    name: Docs (Docusaurus)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install
        working-directory: docs
        run: bun install --frozen-lockfile
      - name: Build
        working-directory: docs
        run: bun run build:cloudflare
      # Cloudflare deployment is handled by the Cloudflare GitHub App
      # via push events. No wrangler deploy step is needed here.
