# CI for OpenMassSpec (umbrella).
#
# The workspace pulls openmassspec-core, opentfraw, opentimstdf, openwraw via
# path = "../<repo>" dependencies, so CI must check out all five repos as
# siblings. The matrix runs fmt + clippy + test on Ubuntu and macOS.

name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  rust:
    name: Rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    steps:
      - name: Checkout OpenMassSpec
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: cargo fmt
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-features --all-targets -- -D warnings

      - name: cargo test
        run: cargo test --workspace --all-features

      - name: vendor2mzml validate against shared corpus (best-effort)
        if: matrix.os == 'ubuntu-latest'
        env:
          OPENMASSSPEC_THERMO_RAW: ${{ secrets.OPENMASSSPEC_THERMO_RAW }}
          OPENMASSSPEC_BRUKER_D: ${{ secrets.OPENMASSSPEC_BRUKER_D }}
          OPENMASSSPEC_WATERS_RAW: ${{ secrets.OPENMASSSPEC_WATERS_RAW }}
        run: |
          set -e
          for VAR in OPENMASSSPEC_THERMO_RAW OPENMASSSPEC_BRUKER_D OPENMASSSPEC_WATERS_RAW; do
            VAL="${!VAR}"
            if [ -z "$VAL" ]; then
              echo "skip $VAR (unset)"
              continue
            fi
            if [ ! -e "$VAL" ]; then
              echo "skip $VAR=$VAL (not present in runner)"
              continue
            fi
            echo "validate $VAR -> $VAL"
            cargo run -p openmassspec-io-cli --release --quiet -- validate --json "$VAL"
          done

  msrv:
    name: MSRV check (1.88)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.88"
      - uses: Swatinem/rust-cache@v2
      - name: cargo check (MSRV)
        run: cargo check --workspace --all-features

  python:
    name: Python smoke (${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.9", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Create venv
        run: |
          python -m venv .venv
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"
          echo "VIRTUAL_ENV=$PWD/.venv" >> "$GITHUB_ENV"
      - name: Install maturin + pytest
        run: pip install 'maturin>=1.5,<2' pytest pyarrow numpy
      - name: Build and install openmassspec-io
        working-directory: crates/openmassspec-io-py
        run: maturin develop --release --features pyo3/extension-module
      - name: Install openmassspec metapackage
        run: pip install ./python
      - name: Import smoke test
        run: python -c "import openmassspec_io; print(openmassspec_io.__version__ if hasattr(openmassspec_io, '__version__') else 'ok')"
      - name: Metapackage import smoke
        run: python -c "import openmassspec; print(openmassspec.__version__); assert callable(openmassspec.to_mzml)"
      - name: Metapackage tests
        run: pytest python/tests -v

  docs:
    name: Docs (Docusaurus)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install
        working-directory: docs
        run: bun install --frozen-lockfile
      - name: Build
        working-directory: docs
        run: bun run build:cloudflare
      # Cloudflare deployment is handled by the Cloudflare GitHub App
      # via push events. No wrangler deploy step is needed here.
