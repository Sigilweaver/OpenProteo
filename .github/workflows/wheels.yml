# Python wheel build for openproteo-io.
#
# Triggered on tag push. Builds abi3-py39 wheels via maturin for the five
# supported targets and an sdist, uploaded as workflow artifacts. PyPI
# publish is deferred and intentionally left out.

name: Release (wheels)

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  wheels:
    name: Wheel ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - label: linux-aarch64
            os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
          - label: macos-x86_64
            os: macos-latest
            target: x86_64-apple-darwin
          - label: macos-aarch64
            os: macos-latest
            target: aarch64-apple-darwin
          - label: windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4
        with:
          path: OpenProteo
      - uses: actions/checkout@v4
        with:
          repository: Sigilweaver/OpenProteoCore
          path: OpenProteoCore
      - uses: actions/checkout@v4
        with:
          repository: Sigilweaver/OpenTFRaw
          path: OpenTFRaw
      - uses: actions/checkout@v4
        with:
          repository: Sigilweaver/OpenTimsTDF
          path: OpenTDF
      - uses: actions/checkout@v4
        with:
          repository: Sigilweaver/OpenWRaw
          path: OpenWRaw

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build wheel via maturin
        uses: PyO3/maturin-action@v1
        with:
          working-directory: OpenProteo/crates/openproteo-io-py
          target: ${{ matrix.target }}
          manylinux: ${{ startsWith(matrix.label, 'linux') && '2_28' || 'auto' }}
          args: --release --out dist --features "pyo3/extension-module arrow"

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: openproteo-io-wheel-${{ matrix.label }}
          path: OpenProteo/crates/openproteo-io-py/dist/*.whl

  sdist:
    name: Source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: OpenProteo
      - uses: actions/checkout@v4
        with:
          repository: Sigilweaver/OpenProteoCore
          path: OpenProteoCore
      - uses: actions/checkout@v4
        with:
          repository: Sigilweaver/OpenTFRaw
          path: OpenTFRaw
      - uses: actions/checkout@v4
        with:
          repository: Sigilweaver/OpenTimsTDF
          path: OpenTDF
      - uses: actions/checkout@v4
        with:
          repository: Sigilweaver/OpenWRaw
          path: OpenWRaw
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          working-directory: OpenProteo/crates/openproteo-io-py
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: openproteo-io-sdist
          path: OpenProteo/crates/openproteo-io-py/dist/*.tar.gz

  collect:
    name: Collect for release
    needs: [wheels, sdist]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - run: ls -la dist
      - name: Attach wheels to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.whl
            dist/*.tar.gz
          generate_release_notes: false
