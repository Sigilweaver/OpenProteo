[book]
title = "OpenProteo"
description = "Pure-Rust mass-spectrometry vendor I/O: Thermo, Bruker, Waters -> mzML, Arrow, Python."
authors = ["Nathan Riley"]
language = "en"
src = "src"

[output.html]
default-theme = "rust"
preferred-dark-theme = "ayu"
git-repository-url = "https://github.com/Sigilweaver/OpenProteo"
edit-url-template = "https://github.com/Sigilweaver/OpenProteo/edit/main/docs/{path}"
mathjax-support = false

[output.html.fold]
enable = true
level = 1

[rust]
edition = "2021"
