[workspace]
resolver = "2"
members = [
    "crates/openproteo-io",
    "crates/openproteo-io-cli",
    "crates/openproteo-io-py",
]

[workspace.package]
edition = "2021"
rust-version = "1.75"
authors = ["Nathan Riley <git@nathanriley.com>"]
license = "Apache-2.0"
repository = "https://github.com/Sigilweaver/OpenProteo"

[workspace.dependencies]
openproteo-core = { path = "../OpenProteoCore", version = "0.1.0" }
opentfraw = { path = "../OpenTFRaw/crates/opentfraw", version = "1.0.5" }
opentimstdf = { path = "../OpenTDF/crates/opentimstdf", version = "1.0.5" }
openwraw = { path = "../OpenWRaw/crates/openwraw", version = "1.0.4" }

[workspace.lints.rust]
unsafe_code = "forbid"
